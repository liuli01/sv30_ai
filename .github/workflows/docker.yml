name: Build and Push Docker Image

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.owner.outputs.owner }}/sv30-ai
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and load image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Health check
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "Starting container from $FIRST_TAG ..."
          docker run -d --name health-check -p 5000:5000 "$FIRST_TAG"

          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health 2>/dev/null; then
              echo "✅ Health check passed"
              docker rm -f health-check
              exit 0
            fi
            sleep 1
          done

          echo "❌ Health check timed out"
          docker logs health-check
          docker rm -f health-check
          exit 1

      - name: Push images
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pushing $tag ..."
            docker push "$tag"
          done
